<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Guevarra | Game Top-Up Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --or:#f97316;--or2:#ea6c0a;--bl:#3b82f6;--gr:#22c55e;
  --dk:#09090f;--dk2:#111118;--dk3:#1a1a26;--dk4:#22222f;--dk5:#2c2c3e;
  --tx:#e2e8f0;--mx:#94a3b8;--bdr:rgba(255,255,255,0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--dk);color:var(--tx);font-family:'Exo 2',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse at 15% 60%,rgba(249,115,22,.06) 0%,transparent 50%),
  radial-gradient(ellipse at 85% 10%,rgba(59,130,246,.06) 0%,transparent 50%)}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--dk2),rgba(249,115,22,.08));
  border-bottom:1px solid rgba(249,115,22,.25);padding:14px 16px;text-align:center;
  position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.hdr h1{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;
  color:var(--or);letter-spacing:3px;text-transform:uppercase}
.hdr-sub{font-size:.72rem;color:var(--mx);margin-top:2px}

/* GAME TABS */
.gtabs{display:flex;overflow-x:auto;gap:2px;padding:10px 10px 0;
  background:var(--dk2);border-bottom:1px solid var(--bdr);scrollbar-width:none}
.gtabs::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:8px 12px;background:var(--dk3);border:1px solid var(--bdr);
  border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.82rem;
  letter-spacing:1px;color:var(--mx);transition:all .2s;display:flex;align-items:center;gap:5px}
.gtab:hover{color:var(--tx);background:var(--dk4)}
.gtab.active{background:var(--dk);color:var(--or);border-color:rgba(249,115,22,.5);border-bottom-color:var(--dk)}
.gtab .ico{font-size:1rem}

/* MAIN */
.main{padding:14px;max-width:580px;margin:0 auto}
.gpanel{display:none}.gpanel.active{display:block}

/* CATEGORY TABS */
.ctabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.ctab{padding:5px 12px;border-radius:20px;border:1px solid var(--dk5);background:var(--dk3);
  color:var(--mx);font-size:.75rem;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.ctab.active{background:var(--or);border-color:var(--or);color:#fff;font-weight:600}

.cpanel{display:none}.cpanel.active{display:block}
.slbl{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--mx);border-left:3px solid var(--or);
  padding-left:8px;margin-bottom:10px;margin-top:6px}

/* 🟠 ORIGINAL ORANGE PRICE CARDS */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.pcard {
    background: var(--dk3);
    border: 1px solid var(--dk5);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: .2s;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 80px;
}
.pcard:hover { border-color: var(--or); background: var(--dk4); }
.pcard.sel { border-color: var(--or) !important; background: rgba(249, 115, 22, 0.1) !important; }
.pcard .pn { font-weight: 600; font-size: .9rem; margin-bottom: 4px; color: #fff; }
.pcard .pd { font-size: .7rem; color: var(--mx); margin-bottom: 4px; }
.pcard .pp { font-weight: 800; color: var(--or); font-size: 1.1rem; }
.pcard .chk {
    position: absolute; top: 5px; right: 5px;
    background: var(--or); color: #fff; width: 18px; height: 18px; border-radius: 50%;
    font-size: 10px; display: none; align-items: center; justify-content: center; z-index: 2;
}
.pcard.sel .chk { display: flex; }

/* NETWORK SELECTOR */
.netgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.netcard{background:var(--dk3);border:1.5px solid var(--bdr);border-radius:10px;
  padding:9px 6px;text-align:center;cursor:pointer;transition:all .18s}
.netcard.active{border-color:var(--bl);background:rgba(59,130,246,.12)}

/* ORDER FORM */
.oform{background:var(--dk2);border:1px solid var(--bdr);border-radius:14px;
  padding:18px;margin-top:6px}
.oform h3{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;
  letter-spacing:2px;color:var(--or);margin-bottom:14px;text-transform:uppercase}
.sel-box{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);
  border-radius:8px;padding:10px 14px;margin-bottom:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mx);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--dk3);border:1px solid var(--dk5);
  border-radius:8px;padding:9px 12px;color:var(--tx);font-family:'Exo 2',sans-serif;font-size:.88rem}
.btn-sub{width:100%;padding:13px;background:var(--or);color:#fff;border:none;
  border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer}
.ok-msg{display:none;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:12px;padding:22px;text-align:center}

/* 🔥 PROMO DESIGN */
.promo-card {
  background: var(--dk3); border: 1px solid var(--dk5); border-radius: 16px;
  padding: 16px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; margin-bottom: 10px;
}
.promo-card:hover { border-color: var(--or); background: var(--dk4); }
.promo-card.sel { border-color: var(--or); background: rgba(249, 115, 22, 0.1); }
.oc-top { display: flex; justify-content: space-between; align-items: flex-start; }
.oc-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.1rem; color: #fff; }
.oc-price { font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--or); }
.promo-card .chk { position: absolute; top: 10px; right: 10px; background: var(--or); color: #fff; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
.promo-card.sel .chk { display: flex; }
</style>
</head>
<body>

<div class="hdr">
  <h1>⚡ Mark's Game Shop</h1>
  <div class="hdr-sub">Affordable Top-Ups · Fast Delivery · Trusted Seller</div>
</div>

<div class="gtabs" id="gtabs">
  <div class="gtab active" data-g="mlbb"><span class="ico">🎮</span> MLBB</div>
  <div class="gtab" data-g="cod"><span class="ico">🎯</span> Garena CoD</div>
  <div class="gtab" data-g="roblox"><span class="ico">🟥</span> Roblox</div>
  <div class="gtab" data-g="bs"><span class="ico">🔫</span> Bloodstrike</div>
  <div class="gtab" data-g="load"><span class="ico">📱</span> Load</div>
</div>

<div class="main">

<div class="gpanel active" id="g-mlbb">
  <div class="ctabs" id="mlbb-ctabs">
    <div class="ctab active" data-c="mlbb-promos">🔥 Promos</div>
    <div class="ctab" data-c="mlbb-dias">💎 Diamonds</div>
    <div class="ctab" data-c="mlbb-skins">🎨 Skins</div>
  </div>

  <div class="cpanel active" id="mlbb-promos">
    <div class="slbl">Monthly Offers</div>
    <div class="promo-card" onclick="selectItem(this, 'mlbb', 'June NSL', 165)">
      <div class="chk">✓</div>
      <div class="oc-top">
        <div class="oc-name">🔥 June NSL <small style="color:#fbbf24; font-size:10px">(Pre-Order)</small></div>
        <div class="oc-price">₱165</div>
      </div>
    </div>
  </div>

  <div class="cpanel" id="mlbb-dias"><div class="pgrid" id="grid-mlbb-dias"></div></div>
  <div class="cpanel" id="mlbb-skins"><div class="pgrid" id="grid-mlbb-skins-cosmo"></div></div>

  <div class="oform">
    <h3>📋 MLBB Order</h3>
    <div class="sel-box" id="mlbb-sel-box" style="display:none">
      <div id="mlbb-sel-item">—</div><div id="mlbb-sel-price" style="color:var(--or);font-weight:bold"></div>
    </div>
    <input type="hidden" id="mlbb-order-display">
    <div class="fg"><label>Player ID <span style="color:var(--or)">*</span></label><input type="text" id="mlbb-pid" placeholder="e.g. 123456789"></div>
    <div class="fg">
      <label>Zone ID <span style="color:var(--or)">*</span></label>
      <div style="display:flex;gap:8px"><input type="text" id="mlbb-zid" placeholder="1234" style="flex:1"><button type="button" onclick="verifyMLBB()" style="background:var(--bl);color:white;border:none;border-radius:8px;padding:0 15px;font-weight:bold;cursor:pointer">Verify</button></div>
    </div>
    <div class="fg"><label>IGN</label><input type="text" id="mlbb-ign" placeholder="Verify to auto-fill" readonly></div>
    
    <div class="pm-widget">
      <div class="pm-methods">
        <div class="pm-btn" onclick="selectPayment('mlbb','gcash',this)"><div class="pmb-name">GCash</div></div>
        <div class="pm-btn" onclick="selectPayment('mlbb','maya',this)"><div class="pmb-name">Maya</div></div>
      </div>
      <div class="pm-details" id="pm-details-mlbb"></div>
      <input type="hidden" id="pm-val-mlbb">
    </div>

    <div class="fg"><label>Receipt <span style="color:var(--or)">*</span></label><input type="file" id="mlbb-screenshot" accept="image/*"></div>
    <button class="btn-sub" id="mlbb-btn" onclick="submitOrder('mlbb')">Submit Order</button>
    <div class="err-msg" id="mlbb-err"></div>
  </div>
</div>

<div class="ok-msg" id="ok-msg">
  <div class="ok-ico">✅</div>
  <h4>ORDER SUBMITTED!</h4>
  <p>Thank you for trusting Mark's Game Shop!</p>
  <button class="btn-sub" onclick="location.reload()">Place Another Order</button>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwN_HQmpMJ2MzWq6WR-2xxv2c1W0qS3zbWFKCBYF1bUFMZT8vFZKeXMS1FsF4wdH1Z9/exec";
let DATA = {};

async function fetchPrices() {
  try {
    const res = await fetch(API_URL);
    DATA = await res.json();
    buildAll();
  } catch (e) { console.error(e); }
}
window.onload = fetchPrices;

function ph(n){ return '₱' + n.toLocaleString('en-PH'); }

function makeGrid(containerId, items, game, cat){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = '';
  items.forEach(it => {
    const c = document.createElement('div');
    c.className = 'pcard';
    c.innerHTML = `<div class="chk">✓</div><div class="pn">${it.n}</div><div class="pp">${ph(it.p)}</div>`;
    c.onclick = () => selectItem(c, game, it.n, it.p);
    el.appendChild(c);
  });
}

function selectItem(card, game, name, price){
  document.querySelectorAll(`.pcard[data-game="${game}"], .promo-card`).forEach(x=>x.classList.remove('sel'));
  if(card) card.classList.add('sel');
  
  const selBox = document.getElementById(game + '-sel-box');
  const orderInput = document.getElementById(game + '-order-display');
  
  if(selBox) {
    selBox.style.display = 'block';
    document.getElementById(game + '-sel-item').textContent = name;
    document.getElementById(game + '-sel-price').textContent = ph(price);
  }
  if(orderInput) orderInput.value = name + ' — ' + ph(price);

  setTimeout(() => {
    const form = document.querySelector(`#g-${game} .oform`);
    if(form) form.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 150);
}

function buildAll(){
  if (DATA.mlbb) {
    makeGrid('grid-mlbb-dias', DATA.mlbb.dias, 'mlbb', 'dias');
    makeGrid('grid-mlbb-skins-cosmo', DATA.mlbb.skinsc, 'mlbb', 'skins');
  }
}

// TAB LOGIC
document.querySelectorAll('.gtab').forEach(t=>{
  t.onclick = () => {
    document.querySelectorAll('.gtab, .gpanel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('g-'+t.dataset.g).classList.add('active');
  };
});

document.querySelectorAll('.ctab').forEach(t=>{
  t.onclick = () => {
    document.querySelectorAll('.ctab, .cpanel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.c).classList.add('active');
  };
});

// SUBMISSION
async function submitOrder(game){
  const btn = document.getElementById(game+'-btn');
  const fileInput = document.getElementById(game+'-screenshot');
  const pmVal = document.getElementById('pm-val-'+game);
  
  if(!pmVal.value || !fileInput.files[0]) return alert("Fill in Payment & Receipt");

  btn.disabled=true; btn.textContent='Uploading...';
  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = async function(e) {
    const fields = {
      game: game.toUpperCase(),
      order: document.getElementById(game+'-order-display').value,
      playerID: document.getElementById(game+'-pid').value,
      zoneID: document.getElementById(game+'-zid') ? document.getElementById(game+'-zid').value : "",
      ign: document.getElementById(game+'-ign').value,
      fileData: e.target.result.split(',')[1],
      mimeType: file.type,
      fileName: file.name,
      paymentMethod: pmVal.value,
      dateTime: new Date().toLocaleString()
    };

    try {
      const res = await fetch("https://script.google.com/macros/s/AKfycbwKbrB6Cb0s-fyY83bkBtgcGgzP_SAmhrPJH5fYQXmlPituBOMvK-ygKXzmLr9uHTa9/exec", {
        method: 'POST',
        body: JSON.stringify(fields),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      });
      document.querySelector('.main').style.display='none';
      document.getElementById('ok-msg').style.display='block';
    } catch(err) { alert("Failed. Try again."); btn.disabled=false; }
  };
  reader.readAsDataURL(file);
}

// PAYMENT
const PM_DATA = {
  gcash: { label:'GCash', name:'Mark Guevarra', num:'09288978005', color:'#3b82f6' },
  maya: { label:'Maya', name:'Mark Guevarra', num:'09288978005', color:'#22c55e' }
};
function selectPayment(game, method, btn){
  const pm = PM_DATA[method];
  document.getElementById('pm-val-'+game).value = pm.label;
  const box = document.getElementById('pm-details-'+game);
  box.className = 'pm-details show';
  box.style.borderLeftColor = pm.color;
  box.innerHTML = `<div style="color:${pm.color};font-weight:bold">${pm.label}</div><div>${pm.name}</div><div>${pm.num}</div>`;
}
</script>
</body>
</html>
