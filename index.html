<style>
:root {
  /* Core Colors */
  --or: #f97316; --or2: #ea6c0a; --bl: #3b82f6; --gr: #22c55e;
  
  /* Premium Nexone Esports Navy Theme */
  --dk: #0f172a;       /* Main Background (Deep Navy) */
  --dk2: #1e293b;      /* Panel Background (Lighter Navy) */
  --dk3: #334155;      /* Hover States */
  --dk4: #3f3f5a;      /* Kept your dk4 for safe fallback */
  --dk5: #475569;      /* Input Backgrounds */
  
  /* Text & Borders */
  --tx: #f8fafc;       /* Crisp White */
  --mx: #94a3b8;       /* Muted Text */
  --bdr: #334155;      /* Premium solid border */
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--dk);
  color: var(--tx);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  
  /* Kept your awesome glowing edge effect! */
  background-image: 
    radial-gradient(ellipse at 15% 60%, rgba(249,115,22,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 10%, rgba(59,130,246,.08) 0%, transparent 50%);
    
  /* Nexone crisp text upgrade */
  -webkit-font-smoothing: antialiased; 
}

/* ── AUTH SCREEN ───────────────────────────────────────── */
#auth-screen{position:fixed;inset:0;background:var(--dk);z-index:9999;
  display:flex;align-items:center;justify-content:center;padding:20px}
#auth-screen.hidden{display:none}
.auth-card{background:var(--dk2);border:1px solid rgba(249,115,22,.25);border-radius:18px;
  padding:32px 24px;width:100%;max-width:380px;text-align:center}
.auth-logo{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;
  color:var(--or);letter-spacing:3px;margin-bottom:4px}
.auth-tagline{font-size:.75rem;color:var(--mx);margin-bottom:24px}
.auth-tabs{display:flex;gap:0;background:var(--dk3);border-radius:10px;padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;
  color:var(--mx);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;
  letter-spacing:1px;cursor:pointer;transition:.2s}
.auth-tab.active{background:var(--or);color:#fff}
.auth-fg{text-align:left;margin-bottom:12px}
.auth-fg label{display:block;font-size:.68rem;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;color:var(--mx);margin-bottom:5px}
.auth-fg input{width:100%;background:var(--dk3);border:1px solid var(--dk5);
  border-radius:8px;padding:10px 13px;color:var(--tx);font-family:'Exo 2',sans-serif;
  font-size:.9rem;transition:.2s}
.auth-fg input:focus{outline:none;border-color:var(--or)}
.auth-btn{width:100%;padding:13px;background:var(--or);color:#fff;border:none;
  border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;
  letter-spacing:2px;cursor:pointer;transition:.2s;margin-top:4px}
.auth-btn:hover{background:var(--or2)}
.auth-btn:disabled{background:var(--dk5);color:var(--mx);cursor:not-allowed}
.auth-err{font-size:.75rem;color:#f87171;margin-top:8px;min-height:18px;text-align:center}
.auth-badges{display:flex;justify-content:center;gap:12px;margin-top:18px;flex-wrap:wrap}
.auth-badge{font-size:.65rem;color:var(--mx);display:flex;align-items:center;gap:4px}
.guest-link{font-size:.72rem;color:var(--mx);margin-top:14px;cursor:pointer;text-decoration:underline}
.guest-link:hover{color:var(--tx)}

/* ── HEADER ────────────────────────────────────────────── */
.hdr{background:linear-gradient(135deg,var(--dk2),rgba(249,115,22,.08));
  border-bottom:1px solid rgba(249,115,22,.25);padding:12px 16px;text-align:center;
  position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.hdr h1{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;
  color:var(--or);letter-spacing:3px;text-transform:uppercase}
.hdr-sub{font-size:.72rem;color:var(--mx);margin-top:1px}
.hdr-user-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:7px;flex-wrap:wrap}
.user-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.1);
  border:1px solid rgba(34,197,94,.3);border-radius:20px;padding:3px 12px;
  font-size:.72rem;color:#4ade80;font-weight:600}
.coins-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,.1);
  border:1px solid rgba(245,158,11,.3);border-radius:20px;padding:3px 11px;
  font-size:.72rem;color:#fbbf24;font-weight:600}
.status-pill{display:inline-flex;align-items:center;gap:6px;border-radius:20px;
  padding:3px 12px;font-size:.72rem;font-weight:600;border:1px solid}
.status-pill.online{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#4ade80}
.status-pill.offline{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#f87171}
