<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Guevarra | Game Top-Up Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --or: #f97316; --or2: #ea6c0a; --bl: #3b82f6; --gr: #22c55e;
  --dk: #09090f; --dk2: #111118; --dk3: #1a1a26; --dk4: #22222f; --dk5: #2c2c3e;
  --tx: #e2e8f0; --mx: #94a3b8; --bdr: rgba(255,255,255,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { 
  background: var(--dk); color: var(--tx); font-family: 'Exo 2', sans-serif; min-height: 100vh;
  background-image: radial-gradient(ellipse at 15% 60%, rgba(249,115,22,.06) 0%, transparent 50%),
  radial-gradient(ellipse at 85% 10%, rgba(59,130,246,.06) 0%, transparent 50%);
}

/* HEADER */
.hdr { 
  background: linear-gradient(135deg, var(--dk2), rgba(249,115,22,.08));
  border-bottom: 1px solid rgba(249,115,22,0.3); padding: 18px; text-align: center;
  position: sticky; top: 0; z-index: 200; backdrop-filter: blur(12px);
}
.hdr h1 { 
  font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700;
  color: var(--or); letter-spacing: 3px; text-transform: uppercase;
}

/* NAVIGATION */
.gtabs { display: flex; overflow-x: auto; gap: 5px; padding: 10px; background: var(--dk2); scrollbar-width: none; }
.gtab { 
  flex-shrink: 0; padding: 8px 16px; background: var(--dk3); border-radius: 8px; cursor: pointer;
  font-family: 'Rajdhani', sans-serif; font-weight: 600; color: var(--mx); border: 1px solid var(--bdr);
}
.gtab.active { background: var(--or); color: #fff; border-color: var(--or); }

.main { padding: 15px; max-width: 600px; margin: 0 auto; }
.gpanel { display: none; }
.gpanel.active { display: block; }

/* CATEGORY TABS */
.ctabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
.ctab { 
  padding: 6px 14px; border-radius: 20px; background: var(--dk3); border: 1px solid var(--dk5);
  font-size: 0.8rem; color: var(--mx); cursor: pointer; white-space: nowrap;
}
.ctab.active { border-color: var(--or); color: var(--or); background: rgba(249,115,22,0.05); }

.cpanel { display: none; }
.cpanel.active { display: block; }
.slbl { 
  font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--or);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; border-left: 3px solid var(--or); padding-left: 8px;
}

/* 🟠 RESTORED ORANGE PRICE CARDS */
.pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.pcard {
  background: var(--dk3); border: 1px solid var(--dk5); border-radius: 12px;
  padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; position: relative;
}
.pcard:hover { border-color: var(--or); background: var(--dk4); }
.pcard.sel { border-color: var(--or) !important; background: rgba(249,115,22,0.1) !important; }
.pcard .pn { font-weight: 600; font-size: 0.95rem; margin-bottom: 5px; color: #fff; }
.pcard .pp { font-weight: 800; color: var(--or); font-size: 1.2rem; }
.pcard .chk {
  position: absolute; top: 8px; right: 8px; background: var(--or); color: #fff;
  width: 20px; height: 20px; border-radius: 50%; font-size: 11px; display: none;
  align-items: center; justify-content: center;
}
.pcard.sel .chk { display: flex; }

/* PROMO CARDS (Special Design) */
.promo-container { display: grid; gap: 10px; }
.promo-card {
  background: var(--dk3); border: 1px solid var(--dk5); border-radius: 16px;
  padding: 16px; cursor: pointer; transition: 0.3s; position: relative;
}
.promo-card:hover { border-color: var(--or); background: var(--dk4); }
.promo-card.sel { border-color: var(--or); background: rgba(249,115,22,0.1); }
.oc-top { display: flex; justify-content: space-between; align-items: center; }
.oc-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.1rem; color: #fff; }
.oc-price { font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--or); }
.promo-card .chk { position: absolute; top: 12px; right: 12px; background: var(--or); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
.promo-card.sel .chk { display: flex; }

/* ORDER FORM */
.oform { background: var(--dk2); border: 1px solid var(--bdr); border-radius: 16px; padding: 20px; margin-top: 10px; }
.oform h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; color: var(--or); margin-bottom: 15px; letter-spacing: 2px; }
.sel-box { background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.2); border-radius: 10px; padding: 12px; margin-bottom: 15px; display: none; }
.fg { margin-bottom: 15px; }
.fg label { display: block; font-size: 0.75rem; color: var(--mx); margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
.fg input, .fg select { width: 100%; background: var(--dk3); border: 1px solid var(--dk5); border-radius: 10px; padding: 10px 14px; color: var(--tx); font-family: inherit; }
.btn-sub { width: 100%; padding: 14px; background: var(--or); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; cursor: pointer; }
</style>
</head>
<body>

<div class="hdr">
  <h1>⚡ MARK'S SHOP</h1>
</div>

<div class="gtabs">
  <div class="gtab active" data-g="mlbb">MLBB</div>
  <div class="gtab" data-g="cod">GARENA COD</div>
  <div class="gtab" data-g="roblox">ROBLOX</div>
  <div class="gtab" data-g="load">LOAD</div>
</div>

<div class="main">
  <div class="gpanel active" id="g-mlbb">
    <div class="ctabs">
      <div class="ctab active" data-c="ml-promos">🔥 PROMOS</div>
      <div class="ctab" data-c="ml-dias">💎 DIAMONDS</div>
      <div class="ctab" data-c="ml-skins">🎨 SKINS</div>
    </div>

    <div class="cpanel active" id="ml-promos">
      <div class="slbl">SPECIAL OFFERS</div>
      <div class="promo-container">
        
        <div class="promo-card" onclick="selectItem(this, 'mlbb', 'June NSL (Normal Starlight)', 165)">
          <div class="chk">✓</div>
          <div class="oc-top">
            <div class="oc-name">⭐ JUNE NSL <small style="color:var(--mx)">(Normal)</small></div>
            <div class="oc-price">₱165</div>
          </div>
        </div>

        <div class="promo-card" onclick="selectItem(this, 'mlbb', 'June PSL (Premium Starlight)', 380)">
          <div class="chk">✓</div>
          <div class="oc-top">
            <div class="oc-name">💎 JUNE PSL <small style="color:var(--mx)">(Premium)</small></div>
            <div class="oc-price">₱380</div>
          </div>
        </div>

      </div>
    </div>

    <div class="cpanel" id="ml-dias">
      <div class="slbl">SELECT DIAMONDS</div>
      <div class="pgrid" id="grid-mlbb-dias"></div>
    </div>

    <div class="cpanel" id="ml-skins">
      <div class="slbl">AVAILABLE SKINS</div>
      <div class="pgrid" id="grid-mlbb-skins"></div>
    </div>

    <div class="oform">
      <h3>📋 COMPLETE ORDER</h3>
      <div class="sel-box" id="mlbb-sel-box">
        <div style="font-weight:700" id="mlbb-sel-item">Item</div>
        <div style="color:var(--or)" id="mlbb-sel-price">₱0</div>
      </div>
      <input type="hidden" id="mlbb-order-display">
      
      <div class="fg"><label>Player ID</label><input type="text" id="mlbb-pid" placeholder="e.g. 12345678"></div>
      <div class="fg"><label>Zone ID</label><input type="text" id="mlbb-zid" placeholder="e.g. 1234"></div>
      <div class="fg"><label>IGN</label><input type="text" id="mlbb-ign" placeholder="Enter Nickname"></div>
      
      <div class="fg"><label>Payment Method</label>
        <select id="pm-val-mlbb">
          <option value="GCash">GCash</option>
          <option value="Maya">Maya</option>
          <option value="GoTyme">GoTyme</option>
        </select>
      </div>
      
      <div class="fg"><label>Receipt / Screenshot</label><input type="file" id="mlbb-screenshot" accept="image/*"></div>
      <button class="btn-sub" id="mlbb-btn" onclick="submitOrder('mlbb')">Submit Order</button>
    </div>
  </div>

  <div class="gpanel" id="g-cod">
    <div class="slbl">GARENA CP</div>
    <div class="pgrid" id="grid-cod"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwN_HQmpMJ2MzWq6WR-2xxv2c1W0qS3zbWFKCBYF1bUFMZT8vFZKeXMS1FsF4wdH1Z9/exec";
let DATA = {};

// 1. FETCH DATA FROM YOUR SHEET
async function fetchPrices() {
  try {
    const response = await fetch(API_URL);
    DATA = await response.json();
    buildAll();
  } catch (err) { console.error("Error loading prices", err); }
}
window.onload = fetchPrices;

function ph(n) { return '₱' + n.toLocaleString('en-PH'); }

// 2. BUILD GRIDS FOR DIAMONDS/SKINS
function makeGrid(containerId, items, game) {
  const el = document.getElementById(containerId);
  if (!el || !items) return;
  el.innerHTML = '';
  items.forEach(it => {
    const c = document.createElement('div');
    c.className = 'pcard';
    c.innerHTML = `<div class="chk">✓</div><div class="pn">${it.n}</div><div class="pp">${ph(it.p)}</div>`;
    c.onclick = () => selectItem(c, game, it.n, it.p);
    el.appendChild(c);
  });
}

// 3. 🎯 THE MASTER SELECTOR (WORKS FOR PROMOS TOO!)
function selectItem(card, game, name, price) {
  // Reset other selections
  document.querySelectorAll('.pcard, .promo-card').forEach(x => x.classList.remove('sel'));
  if (card) card.classList.add('sel');

  const selBox = document.getElementById(game + '-sel-box');
  const orderInput = document.getElementById(game + '-order-display');
  
  if (selBox) {
    selBox.style.display = 'block';
    document.getElementById(game + '-sel-item').textContent = name;
    document.getElementById(game + '-sel-price').textContent = ph(price);
  }
  if (orderInput) orderInput.value = name + ' — ' + ph(price);

  // Auto-scroll to form
  setTimeout(() => {
    const form = document.querySelector(`#g-${game} .oform`);
    if (form) form.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 150);
}

function buildAll() {
  if (DATA.mlbb) {
    makeGrid('grid-mlbb-dias', DATA.mlbb.dias, 'mlbb');
    makeGrid('grid-mlbb-skins', DATA.mlbb.skins, 'mlbb');
  }
  if (DATA.cod) makeGrid('grid-cod', DATA.cod, 'cod');
}

// INTERFACE LOGIC
document.querySelectorAll('.gtab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.gtab, .gpanel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('g-' + t.dataset.g).classList.add('active');
  };
});

document.querySelectorAll('.ctab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.ctab, .cpanel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.c).classList.add('active');
  };
});

// SUBMIT ORDER TO GOOGLE APPS SCRIPT
async function submitOrder(game) {
  const btn = document.getElementById(game + '-btn');
  const fileInput = document.getElementById(game + '-screenshot');
  const pmVal = document.getElementById('pm-val-' + game).value;
  
  if (!fileInput.files[0]) return alert("Please upload receipt!");

  btn.disabled = true; btn.textContent = 'Submitting...';
  
  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = async function(e) {
    const fields = {
      game: game.toUpperCase(),
      order: document.getElementById(game + '-order-display').value,
      playerID: document.getElementById(game + '-pid').value,
      zoneID: document.getElementById(game + '-zid') ? document.getElementById(game + '-zid').value : "",
      ign: document.getElementById(game + '-ign').value,
      fileData: e.target.result.split(',')[1],
      mimeType: file.type,
      fileName: file.name,
      paymentMethod: pmVal,
      dateTime: new Date().toLocaleString()
    };

    try {
      const res = await fetch("https://script.google.com/macros/s/AKfycbwKbrB6Cb0s-fyY83bkBtgcGgzP_SAmhrPJH5fYQXmlPituBOMvK-ygKXzmLr9uHTa9/exec", {
        method: 'POST',
        body: JSON.stringify(fields),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      });
      alert("Order successfully submitted!");
      location.reload();
    } catch (err) { alert("Failed. Try again."); btn.disabled = false; }
  };
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
